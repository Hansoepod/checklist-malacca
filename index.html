<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kotakspin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#1C1917; --surface:#24201C; --line:#3A332C;
      --accent:#E3A857; --text:#F5EFE6; --muted:#A79C8E;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{
      background:var(--bg); color:var(--text);
      font-family:'Inter',system-ui,sans-serif;
      display:flex; align-items:center; justify-content:center;
      padding:24px;
    }
    .card{
      max-width:440px; width:100%; text-align:center;
    }
    .eyebrow{
      color:var(--accent); text-transform:uppercase; letter-spacing:.14em;
      font-size:11px; font-weight:600; margin-bottom:10px;
    }
    h1{
      font-family:'Space Grotesk',sans-serif; font-size:32px; font-weight:700;
      margin-bottom:12px; letter-spacing:-.01em;
    }
    p{
      color:var(--muted); font-size:14px; line-height:1.6; margin-bottom:32px;
    }
    .btn{
      display:inline-flex; align-items:center; gap:8px;
      background:var(--accent); color:#1C1917;
      font-weight:600; font-size:14px;
      padding:13px 26px; border-radius:8px;
      text-decoration:none; width:100%;
      justify-content:center;
      transition:transform 0.15s ease, opacity 0.15s ease;
    }
    .btn:hover{ opacity:0.9; transform:translateY(-1px); }
    .btn svg{width:16px;height:16px;flex-shrink:0;}
    .btn.secondary{
      background:var(--surface); color:var(--text); border:1px solid var(--line);
    }
    .btn-group{
      display:flex; flex-direction:column; gap:12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Kotakspin</div>
    <h1>Selamat Datang</h1>
    <p>Akses papan kepatuhan laporan operasional Malacca Toast di sini.</p>
    <div class="btn-group">
      <a class="btn" href="https://home.kotakspin.web.id">
        Buka Papan Kepatuhan
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </a>

      <!-- Contoh tombol tambahan — copy blok <a> ini, ganti href & teksnya -->
      <!--
      <a class="btn secondary" href="https://produk-lain.kotakspin.web.id">
        Nama Produk Lain
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </a>
      -->
    </div>
  </div>
</body>
</html>
