<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papan Kepatuhan Laporan — Malacca Toast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1C1917; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1C1917; color: #A79C8E;
      font-family: -apple-system, Inter, Arial, sans-serif; font-size: 14px;
      transition: opacity 0.3s ease;
    }
    #loading .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #E3A857;
      margin-bottom: 14px; animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    iframe {
      display: block; width: 100%; height: 100vh; border: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="dot"></div>
    Memuat papan kepatuhan laporan…
  </div>

  <!-- GANTI URL DI BAWAH INI dengan Web App URL dari deployment GAS kamu -->
  <iframe
    id="dashboard-frame"
    src="https://script.google.com/macros/s/AKfycbxfR9tWkieK_b6i3XqJDksvgICEboiwV8Whm25eW5leL-5Tp-rE89MgNS9KEzwzNVuC/exec"
    title="Papan Kepatuhan Laporan"
    onload="document.getElementById('loading').style.opacity='0'; setTimeout(()=>document.getElementById('loading').style.display='none', 300);"
  ></iframe>
</body>
</html>
